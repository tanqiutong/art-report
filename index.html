<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来美术坊 · 每日美育竞品简报</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #5b4fcf;
  --primary-dark: #3d35a8;
  --primary-mid: #7c6fe8;
  --primary-light: #ede9fe;
  --bg: #f7f6fc;
  --white: #fff;
  --text: #1e1b4b;
  --text-sub: #4c4878;
  --text-muted: #9691c4;
  --shadow: 0 4px 20px rgba(91,79,207,0.13);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
}

/* ── 顶部细条 ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: linear-gradient(90deg, #3d35a8 0%, #6b5ce7 60%, #a78bfa 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(61,53,168,0.18);
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-logo {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .04em;
}
.topbar-tag {
  font-size: 10px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.85);
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .06em;
}
.topbar-right {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  letter-spacing: .04em;
}

/* ── 主体：全屏 iframe ── */
.report-frame {
  position: fixed;
  top: 44px; left: 0; right: 0; bottom: 0;
}
.report-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.report-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text-muted);
  font-size: 14px;
}
.report-empty .empty-icon {
  font-size: 40px;
  opacity: .4;
}

/* ── 右下角浮标 ── */
.fab {
  position: fixed;
  right: 20px;
  bottom: 24px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #5b4fcf, #a78bfa);
  box-shadow: 0 4px 16px rgba(91,79,207,0.38);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 200;
  border: none;
  transition: transform .2s, box-shadow .2s;
}
.fab:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 20px rgba(91,79,207,0.45);
}
.fab-icon {
  font-size: 20px;
  color: #fff;
  line-height: 1;
  user-select: none;
}
/* 期数徽标 */
.fab-badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 20px; height: 20px;
  background: #e53e3e;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 2px solid #f7f6fc;
}

/* ── 抽屉遮罩 ── */
.drawer-mask {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(30,27,75,0.35);
  z-index: 300;
  backdrop-filter: blur(2px);
}
.drawer-mask.open { display: block; }

/* ── 历史归档抽屉 ── */
.drawer {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 320px;
  background: var(--white);
  z-index: 400;
  box-shadow: -4px 0 24px rgba(91,79,207,0.16);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  padding: 18px 20px 14px;
  background: linear-gradient(125deg, #3d35a8, #7c6fe8);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.drawer-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .04em;
}
.drawer-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.drawer-close:hover { background: rgba(255,255,255,0.3); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 20px;
}

/* 归档条目 */
.arch-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  border: 1px solid rgba(91,79,207,0.1);
  background: var(--white);
  transition: background .15s, border-color .15s, box-shadow .15s;
}
.arch-item:hover {
  background: var(--primary-light);
  border-color: var(--primary-mid);
  box-shadow: 0 2px 8px rgba(91,79,207,0.1);
}
.arch-item.active {
  background: linear-gradient(90deg, #ede9fe, #f3f0ff);
  border-color: var(--primary);
}
.arch-num {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #5b4fcf, #7c6fe8);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.arch-item.active .arch-num {
  background: linear-gradient(135deg, #3d35a8, #5b4fcf);
}
.arch-info { flex: 1; min-width: 0; }
.arch-date { font-size: 14px; font-weight: 600; color: var(--text); }
.arch-sub  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.arch-arrow { font-size: 12px; color: var(--text-muted); }

/* 抽屉底部：外链 */
.drawer-footer {
  padding: 12px 16px;
  border-top: 1px solid rgba(91,79,207,0.1);
  flex-shrink: 0;
}
.drawer-footer a {
  display: block;
  text-align: center;
  font-size: 12px;
  color: var(--primary);
  text-decoration: none;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--primary-light);
  transition: background .15s;
}
.drawer-footer a:hover { background: var(--primary-light); }

/* ── 响应式 ── */
@media (max-width: 480px) {
  .drawer { width: 100%; }
}
</style>
</head>
<body>

<!-- 顶部细条 -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">未来美术坊</span>
    <span class="topbar-tag">竞品简报</span>
  </div>
  <span class="topbar-right" id="topbar-date">每日自动更新</span>
</div>

<!-- 主体简报 -->
<div class="report-frame" id="reportFrame">
  <div class="report-empty">
    <div class="empty-icon">📋</div>
    <div>加载中…</div>
  </div>
</div>

<!-- 遮罩 -->
<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>

<!-- 历史归档抽屉 -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">📚 往期简报</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <div style="text-align:center;padding:40px 0;color:#9691c4;font-size:13px;">加载中…</div>
  </div>
  <div class="drawer-footer">
    <a href="https://tanqiutong.github.io/art-report" target="_blank">查看所有期次 ↗</a>
  </div>
</div>

<!-- 右下角浮标 -->
<button class="fab" id="fab" onclick="toggleDrawer()" title="往期简报">
  <span class="fab-icon">🗂</span>
  <span class="fab-badge" id="fabBadge" style="display:none">0</span>
</button>

<script>
(function () {
  var currentFile = null;
  var allReports = [];

  /* 加载索引 */
  fetch('./reports-index.json?_=' + Date.now())
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data || data.length === 0) {
        document.getElementById('reportFrame').innerHTML =
          '<div class="report-empty"><div class="empty-icon">📭</div><div>暂无简报，第一期将在下次自动任务运行后发布</div></div>';
        return;
      }

      allReports = data;

      /* 更新顶栏日期 */
      document.getElementById('topbar-date').textContent = data[0].date + ' · 最新一期';

      /* 更新浮标徽标 */
      var archCount = data.length - 1;
      if (archCount > 0) {
        var badge = document.getElementById('fabBadge');
        badge.textContent = archCount > 99 ? '99+' : archCount;
        badge.style.display = 'flex';
      }

      /* 展示最新一期 */
      loadReport(data[0], 0);

      /* 渲染抽屉归档列表（含最新期） */
      renderDrawer(data);
    })
    .catch(function () {
      document.getElementById('reportFrame').innerHTML =
        '<div class="report-empty"><div class="empty-icon">⚠️</div><div>简报加载失败，请刷新重试</div></div>';
    });

  /* 加载指定简报到 iframe */
  function loadReport(item, idx) {
    currentFile = item.file;
    var frame = document.getElementById('reportFrame');
    frame.innerHTML = '<iframe src="./reports/' + item.file + '" title="' + item.date + '" loading="lazy"></iframe>';

    /* 更新顶栏 */
    document.getElementById('topbar-date').textContent = item.date + ' · 第' + (allReports.length - idx) + '期';

    /* 高亮当前条目 */
    document.querySelectorAll('.arch-item').forEach(function (el, i) {
      el.classList.toggle('active', i === idx);
    });
  }

  /* 渲染抽屉 */
  function renderDrawer(data) {
    var html = data.map(function (item, i) {
      var period = data.length - i;
      return (
        '<div class="arch-item' + (i === 0 ? ' active' : '') + '" onclick="selectReport(' + i + ')">' +
          '<div class="arch-num">' + (period < 10 ? '0' + period : period) + '</div>' +
          '<div class="arch-info">' +
            '<div class="arch-date">' + item.date + '</div>' +
            '<div class="arch-sub">' + (i === 0 ? '最新一期' : '历史归档') + '</div>' +
          '</div>' +
          '<span class="arch-arrow">›</span>' +
        '</div>'
      );
    }).join('');
    document.getElementById('drawerBody').innerHTML = html;
  }

  /* 选择某期 */
  window.selectReport = function (idx) {
    loadReport(allReports[idx], idx);
    closeDrawer();
  };

  /* 浮标开关 */
  window.toggleDrawer = function () {
    var drawer = document.getElementById('drawer');
    var mask = document.getElementById('drawerMask');
    if (drawer.classList.contains('open')) {
      closeDrawer();
    } else {
      drawer.classList.add('open');
      mask.classList.add('open');
    }
  };

  window.closeDrawer = function () {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerMask').classList.remove('open');
  };

  /* ESC 关闭 */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeDrawer();
  });
})();
</script>
</body>
</html>
